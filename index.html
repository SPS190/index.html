<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Flipper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d2021; height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; padding: 12px; overflow: hidden; }
        .container { background: rgba(255,255,255,0.04); padding: 16px; border-radius: 16px; text-align: center; width: 100%; max-width: 290px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .stats-board { display: flex; justify-content: space-around; background: rgba(0,0,0,0.25); padding: 8px; border-radius: 8px; margin-bottom: 12px; font-size: 11px; font-weight: 600; }
        h1 { font-size: 18px; color: #f5f5f0; margin-bottom: 8px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .coin-wrapper { perspective: 800px; width: 100px; height: 100px; margin: 15px auto; }
        .coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: 800; border: 3px solid #f5f5f0; box-shadow: inset 0 0 15px rgba(0,0,0,0.4), 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 4px; }
        .heads { background: linear-gradient(45deg, #005a5b, #4ca6a6); color: #fff; }
        .tails { background: linear-gradient(45deg, #fffff0, #e6e6da); color: #004d4d; transform: rotateY(180deg); }
        @keyframes flip-h { 0% { transform: rotateY(0); } 100% { transform: rotateY(1800deg); } }
        @keyframes flip-t { 0% { transform: rotateY(0); } 100% { transform: rotateY(1980deg); } }
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; width: 100%; }
        button { background: #008080; color: #fffff0; border: none; padding: 10px; font-size: 15px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.1s; width: 100%; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.98); background: #009999; }
        .reset-btn { background: transparent; color: #778888; border: 1px solid #2b4040; font-size: 12px; padding: 6px; }
        #resultText { font-size: 15px; margin-top: 12px; min-height: 22px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-board">
            <div>H: <span id="hC" style="color:#4ca6a6;">0</span></div>
            <div>Total: <span id="tC">0</span></div>
            <div>T: <span id="tC2" style="color:#fffff0;">0</span></div>
        </div>
        <h1>🪙 Shaurya's Flipper</h1>
        <div class="coin-wrapper"><div class="coin" id="coin"><div class="side heads">SHAURYA</div><div class="side tails">SHAURYA</div></div></div>
        <div id="resultText">Tap to flip!</div>
        <div class="btn-group">
            <button id="fB" onclick="flip()">Flip Coin</button>
            <button id="rB" class="reset-btn" onclick="reset()">Reset</button>
        </div>
    </div>
    <script>
        let h = 0, t = 0, tot = 0;
        function sound(type) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)(), osc = ctx.createOscillator(), g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                if (type === 's') { osc.frequency.setValueAtTime(850, ctx.currentTime); g.gain.setValueAtTime(0.15, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.start(); osc.stop(ctx.currentTime + 0.1); }
                else if (type === 'h') { osc.frequency.setValueAtTime(1100, ctx.currentTime); g.gain.setValueAtTime(0.15, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.start(); osc.stop(ctx.currentTime + 0.1); }
                else { osc.type = 'triangle'; osc.frequency.setValueAtTime(350, ctx.currentTime); g.gain.setValueAtTime(0.2, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.start(); osc.stop(ctx.currentTime + 0.1); }
            } catch (e) {}
        }
        function flip() {
            let c = document.getElementById('coin'), fB = document.getElementById('fB'), rB = document.getElementById('rB'), rT = document.getElementById('resultText');
            fB.disabled = rB.disabled = true; rT.innerText = "Flipping..."; sound('s');
            c.style.animation = 'none'; c.offsetHeight;
            let isH = Math.random() < 0.5;
            c.style.animation = isH ? 'flip-h 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.15)' : 'flip-t 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.15)';
            setTimeout(() => {
                tot++;
                if (isH) { h++; sound('h'); rT.innerText = "🎉 Result: HEADS"; rT.style.color = "#4ca6a6"; }
                else { t++; sound('t'); rT.innerText = "🎉 Result: TAILS"; rT.style.color = "#fffff0"; }
                document.getElementById('hC').innerText = h;
                document.getElementById('tC2').innerText = t;
                document.getElementById('tC').innerText = tot;
                fB.disabled = rB.disabled = false;
            }, 800);
        }
        function reset() {
            h = t = tot = 0;
            document.getElementById('hC').innerText = document.getElementById('tC2').innerText = document.getElementById('tC').innerText = "0";
            document.getElementById('resultText').innerText = "Tap to flip!"; rT = document.getElementById('resultText'); rT.style.color = "#fff";
            document.getElementById('coin').style.animation = 'none';
        }
    </script>
</body>
</html>
